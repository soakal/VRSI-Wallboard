name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Shared types must be built first so the server's file: dependency resolves.
      - run: npm install
        working-directory: shared
      - run: npm run build
        working-directory: shared
      - run: npm install
        working-directory: server
      - run: npm run build
        working-directory: server
      - run: npm test
        working-directory: server
